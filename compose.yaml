x-airflow-common : &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-crypto}:${POSTGRES_PASSWORD:-crypto_secret}@postgres/${POSTGRES_DB:-crypto_db}
    AIRFLOW__CORE__FERNET_KEY: 'dGhpcy1zaG91bGQtYmUtMzJieXRlcw=='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    _PIP_ADDITIONAL_REQUIREMENTS: 'kafka-python redis psycopg2-binary'
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - ./orchestration/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: timescale/timescaledb-ha:pg15-latest 
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crypto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_db}
    volumes:
      - postgres_data:/home/postgres/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto} -d ${POSTGRES_DB:-crypto_db} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5 

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - | 
        airflow db init
        airflow users create -u admin -p admin -f Admin -l User -r Admin -e evanskipsang21@gmail.com

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8085:8080"
    command: webserver
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  postgres_data:
  airflow_logs:
